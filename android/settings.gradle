rootProject.name = 'CallverseNative'

// Apply React Native native modules configuration
apply from: file("../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesSettingsGradle(settings)

// Include app module
include ':app'

// Include React Native Gradle plugin
includeBuild('../node_modules/@react-native/gradle-plugin')

// Include and configure react-native-webrtc
include ':rnwebrtc'
project(':rnwebrtc').projectDir = new File(rootProject.projectDir, '../node_modules/@videosdk.live/react-native-webrtc/android')

// Include and configure react-native-foreground-service
include ':rnfgservice'
project(':rnfgservice').projectDir = new File(rootProject.projectDir, '../node_modules/@videosdk.live/react-native-foreground-service/android')
